<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Asistencia</title>

<!-- ✅ LIBRERÍAS CORRECTAS -->
<script src="https://unpkg.com/html5-qrcode@2.3.9/html5-qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background:#f4f6f9;
  margin:0;
}

header {
  background:#2c3e50;
  color:#fff;
  padding:1rem;
  text-align:center;
}

.card {
  background:#fff;
  margin:1rem auto;
  padding:1rem;
  max-width:900px;
  border-radius:8px;
}

.dashboard-grid {
  display:flex;
  justify-content:space-around;
  max-width:900px;
  margin:auto;
}

.stat-card {
  background:#ecf0f1;
  padding:1rem;
  flex:1;
  margin:.5rem;
  text-align:center;
}

table {
  width:100%;
  border-collapse:collapse;
  margin-top:1rem;
}

th, td {
  border:1px solid #ccc;
  padding:.5rem;
  text-align:center;
}

thead {
  background:#34495e;
  color:#fff;
}

#status {
  text-align:center;
  font-weight:bold;
  margin-bottom:.5rem;
}

.presente { color:green; font-weight:bold }
.ausente { color:red; font-weight:bold }

button {
  padding:.6rem 1.5rem;
  margin-bottom:1rem;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <h1>Control de Asistencia</h1>
</header>

<div class="dashboard-grid">
  <div class="stat-card">
    <h3>Presentes</h3>
    <p id="totalPresentes">0</p>
  </div>
  <div class="stat-card">
    <h3>Ausentes</h3>
    <p id="totalAusentes">0</p>
  </div>
</div>

<div class="card">
  <div id="status">📷 Escanee el código QR</div>
  <div id="reader" style="width:100%"></div>
</div>

<div class="card">
  <button onclick="exportarExcel()">📥 Descargar Excel</button>

  <table id="tablaAsistencia">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Estado</th>
        <th>Fecha</th>
        <th>Hora</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
/* ✅ URL DE TU APPS SCRIPT (YA CONFIRMADA) */
const URL_API =
"https://script.google.com/macros/s/AKfycbwKy5ejOBAvQC-vmwkGenPz2VatLV6tnhVK9nEST5izFSdWoZq8JNj_tq3CTC8cZpBi/exec";

let scanner = null;

/* ✅ INICIAR ESCÁNER */
function iniciarScanner() {
  if (scanner) {
    scanner.clear().catch(() => {});
  }

  scanner = new Html5QrcodeScanner("reader", {
    fps: 10,
    qrbox: 250
  });

  scanner.render(texto => registrar(texto));
}

/* ✅ REGISTRAR ASISTENCIA */
function registrar(nombre) {
  scanner.clear().catch(() => {});
  document.getElementById("status").textContent = "⏳ Registrando...";

  fetch(URL_API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ nombre })
  })
  .then(r => r.json())
  .then(resp => {
    document.getElementById("status").textContent =
      resp.status === "ok"
        ? "✅ Asistencia registrada"
        : "ℹ️ Ya registrado hoy";

    actualizarTabla();

    setTimeout(() => {
      document.getElementById("status").textContent =
        "📷 Escanee el código QR";
      iniciarScanner();
    }, 2000);
  })
  .catch(() => {
    document.getElementById("status").textContent = "❌ Error de red";
    setTimeout(iniciarScanner, 3000);
  });
}

/* ✅ ACTUALIZAR TABLA Y CONTADORES */
function actualizarTabla() {
  fetch(URL_API)
    .then(r => r.json())
    .then(data => {
      if (!data || !Array.isArray(data.usuarios)) return;

      const tbody = document.querySelector("#tablaAsistencia tbody");
      tbody.innerHTML = "";

      let presentes = 0;
      let ausentes = 0;

      const hoy = new Date().toLocaleDateString("es-ES", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric"
      });

      data.usuarios.forEach(nombre => {
        const a = (data.asistencias || []).find(x =>
          x.nombre === nombre && x.fecha === hoy
        );

        const tr = document.createElement("tr");

        if (a) {
          presentes++;
          tr.innerHTML = `
            <td>${nombre}</td>
            <td class="presente">Presente</td>
            <td>${a.fecha}</td>
            <td>${a.hora}</td>`;
        } else {
          ausentes++;
          tr.innerHTML = `
            <td>${nombre}</td>
            <td class="ausente">Ausente</td>
            <td>--</td>
            <td>--</td>`;
        }

        tbody.appendChild(tr);
      });

      document.getElementById("totalPresentes").textContent = presentes;
      document.getElementById("totalAusentes").textContent = ausentes;
    });
}
