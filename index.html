<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistencia QR</title>

<script src="libs/html5-qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; background:#f4f6f9; margin:0 }
header { background:#2c3e50; color:#fff; padding:1rem; text-align:center }
.card { background:#fff; margin:1rem auto; padding:1rem; max-width:800px; border-radius:8px }
.dashboard-grid { display:flex; justify-content:space-around; max-width:800px; margin:auto }
.stat-card { background:#ecf0f1; padding:1rem; flex:1; margin:.5rem; text-align:center }
table { width:100%; border-collapse:collapse }
th,td { border:1px solid #ccc; padding:.5rem; text-align:center }
thead { background:#34495e; color:#fff }
#status { text-align:center; font-weight:bold; margin:.5rem }
</style>
</head>

<body>

<header>
<h1>Control de Asistencia</h1>
</header>

<div class="dashboard-grid">
<div class="stat-card">
<h3>Presentes</h3>
<p id="totalPresentes">0</p>
</div>
<div class="stat-card">
<h3>Ausentes</h3>
<p id="totalAusentes">0</p>
</div>
</div>

<div class="card">
<div id="status">📷 Iniciando cámara…</div>
<div id="reader"></div>
</div>

<div class="card">
<table id="tablaAsistencia">
<thead>
<tr>
<th>Nombre</th>
<th>Estado</th>
<th>Fecha</th>
<th>Hora</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script>
const URL_API = "PEGA_AQUI_TU_URL_DEL_WEB_APP";

let scanner;

function iniciarScanner() {
  scanner = new Html5QrcodeScanner("reader", { fps:10, qrbox:250 });
  scanner.render(text => registrar(text));
}

function registrar(nombre) {
  scanner.clear();
  document.getElementById("status").textContent = "⏳ Registrando…";

  fetch(URL_API, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ nombre })
  })
  .then(r => r.json())
  .then(resp => {
    document.getElementById("status").textContent =
      resp.status === "ok"
      ? "✅ Asistencia registrada"
      : "ℹ️ Ya registrado";
    actualizarTabla();
    setTimeout(iniciarScanner, 2000);
  })
  .catch(() => {
    document.getElementById("status").textContent = "❌ Error de red";
    setTimeout(iniciarScanner, 3000);
  });
}

function actualizarTabla() {
  fetch(URL_API)
  .then(r => r.json())
  .then(data => {
    const tbody = document.querySelector("#tablaAsistencia tbody");
    tbody.innerHTML = "";

    let presentes = 0;
    let ausentes = 0;

    const hoy = new Date().toLocaleDateString("es-ES", {
      day:"2-digit", month:"2-digit", year:"numeric"
    });

    const usuarios = data.usuarios.slice(1).map(u => u[0]);
    const asistenciasHoy = data.asistencias.slice(1)
      .filter(a => a[1] === hoy);

    usuarios.forEach(nombre => {
      const r = asistenciasHoy.find(a => a[0] === nombre);
      const tr = document.createElement("tr");

      if (r) {
        presentes++;
        tr.innerHTML = `<td>${nombre}</td><td>Presente</td><td>${r[1]}</td><td>${r[2]}</td>`;
      } else {
        ausentes++;
        tr.innerHTML = `<td>${nombre}</td><td>Ausente</td><td>--</td><td>--</td>`;
      }
      tbody.appendChild(tr);
    });

    document.getElementById("totalPresentes").textContent = presentes;
    document.getElementById("totalAusentes").textContent = ausentes;
  });
}

window.onload = () => {
  iniciarScanner();
  actualizarTabla();
};
</script>

</body>
</html>
