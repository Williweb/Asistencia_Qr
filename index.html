<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Asistencia</title>
    
    <!-- ✅ LIBRERÍA DESDE CDN CONFIABLE -->
   <script src="libs/html5-qrcode.min.js"></script>
   <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body { font-family: Arial, sans-serif; background:#f4f6f9; margin:0; }
        header { background:#2c3e50; color:#fff; padding:1rem; text-align:center; }
        .card { background:#fff; margin:1rem auto; padding:1rem; max-width:600px; border-radius:8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .dashboard-grid { display:flex; justify-content:space-around; max-width:600px; margin:auto; }
        .stat-card { background:#ecf0f1; padding:1rem; flex:1; margin:.5rem; text-align:center; border-radius:8px; }
        table { width:100%; border-collapse:collapse; margin-top:1rem; font-size: 0.9rem; }
        th, td { border:1px solid #ccc; padding:.5rem; text-align:center; }
        thead { background:#34495e; color:#fff; }
        #status { text-align:center; font-weight:bold; margin-bottom:1rem; padding: 10px; border-radius: 5px; background: #eee; }
        .presente { color:green; font-weight:bold }
        .ausente { color:red; font-weight:bold }
        #reader { width: 100% !important; border: none !important; }
        button { width: 100%; padding: .8rem; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <img src="https://fusalmo.org/salesianos/assets/logo-fusalmov2.png" alt="Logo" style="height: 60px; margin-bottom: 10px;">
    <h1>Control de Asistencia</h1>
</header>

<div class="dashboard-grid">
    <div class="stat-card">
        <h3>Presentes</h3>
        <p id="totalPresentes">0</p>
    </div>
    <div class="stat-card">
        <h3>Ausentes</h3>
        <p id="totalAusentes">0</p>
    </div>
</div>

<div class="card">
    <div id="status">📷 Cargando cámara...</div>
    <div id="reader"></div>
</div>

<div class="card">
    <button onclick="exportarExcel()">📥 Descargar Reporte Excel</button>
    <table id="tablaAsistencia">
        <thead>
    <tr>
        <th>Nombre</th>
        <th>Estado</th>
        <th>Fecha</th>
        <th>Hora</th>
    </tr>
</thead>
        <tbody></tbody>
    </table>
</div>

<script>
const URL_API = "https://script.google.com/macros/s/AKfycbwKy5ejOBAvQC-vmwkGenPz2VatLV6tnhVK9nEST5izFSdWoZq8JNj_tq3CTC8cZpBi/exec";
let html5QrcodeScanner;

// 1. INICIAR EL ESCÁNER
function iniciarScanner() {
    html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
        fps: 10, 
        qrbox: { width: 250, height: 250 },
        aspectRatio: 1.0
    });
    html5QrcodeScanner.render(onScanSuccess, onScanFailure);
}

function onScanSuccess(decodedText) {
    html5QrcodeScanner.clear();
    registrarAsistencia(decodedText);
}

function onScanFailure(error) {}

// 2. REGISTRAR EN GOOGLE SHEETS
function registrarAsistencia(nombre) {
    document.getElementById("status").textContent = "⏳ Registrando: " + nombre;
    document.getElementById("status").style.background = "#fff3cd";

    fetch(URL_API, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify({ nombre })
    })
    .then(() => {
        document.getElementById("status").textContent = "✅ " + nombre + " registrado";
        document.getElementById("status").style.background = "#d4edda";
        actualizarTabla();
        setTimeout(iniciarScanner, 3000);
    });
}

// 3. ACTUALIZAR TABLA (SOLO HOY)
function actualizarTabla() {
    fetch(`${URL_API}?t=${Date.now()}`)
        .then(res => res.json())
        .then(data => {
            const tbody = document.querySelector("#tablaAsistencia tbody");
            tbody.innerHTML = "";

            let presentes = 0;
            const usuarios = data.usuarios || [];
            const asistencias = data.asistencias || [];

            // ✅ Fecha hoy compatible
            const hoy = new Date().toISOString().split("T")[0];

            usuarios.forEach(nombre => {
                const registro = asistencias.find(a =>
                    a.nombre === nombre && a.fecha.includes(hoy)
                );

                const tr = document.createElement("tr");

                if (registro) {
                    presentes++;
                    tr.innerHTML = `
                        <td>${nombre}</td>
                        <td class="presente">Presente</td>
                        <td>${registro.fecha}</td>
                        <td>${registro.hora}</td>
                    `;
                } else {
                    tr.innerHTML = `
                        <td>${nombre}</td>
                        <td class="ausente">Ausente</td>
                        <td>--</td>
                        <td>--</td>
                    `;
                }
                tbody.appendChild(tr);
            });

            document.getElementById("totalPresentes").textContent = presentes;
            document.getElementById("totalAusentes").textContent =
                usuarios.length - presentes;
        });
}

// 4. EXPORTAR
function exportarExcel() {
    const table = document.getElementById("tablaAsistencia");
    const wb = XLSX.utils.table_to_book(table);
    XLSX.writeFile(wb, "Asistencia.xlsx");
}

// INICIO
window.onload = () => {
    iniciarScanner();
    actualizarTabla();
};
</script>


</body>
</html>
